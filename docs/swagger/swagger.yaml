definitions:
  dto.AdminCreditAdjustRequest:
    properties:
      amount:
        type: integer
      description:
        type: string
      user_id:
        type: string
    required:
    - amount
    - description
    - user_id
    type: object
  dto.CreatePaymentRequest:
    properties:
      amount:
        type: integer
      method:
        type: string
      purpose:
        type: string
      purpose_ref_id:
        type: string
    required:
    - amount
    - method
    - purpose
    type: object
  dto.PurchaseCreditRequest:
    properties:
      idempotency_key:
        type: string
      package_code:
        type: string
      payment_method:
        type: string
    required:
    - package_code
    - payment_method
    type: object
  dto.SubscribeRequest:
    properties:
      billing_cycle:
        enum:
        - monthly
        - yearly
        type: string
      package_code:
        type: string
      payment_method:
        type: string
    required:
    - billing_cycle
    - package_code
    - payment_method
    type: object
  dto.UnlockContactRequest:
    properties:
      idempotency_key:
        type: string
      product_id:
        type: string
      seller_id:
        type: string
    required:
    - product_id
    - seller_id
    type: object
  dto.UpgradeSubscriptionRequest:
    properties:
      billing_cycle:
        enum:
        - monthly
        - yearly
        type: string
      package_code:
        type: string
      payment_method:
        type: string
    required:
    - billing_cycle
    - package_code
    - payment_method
    type: object
info:
  contact: {}
  description: Payment service API (Gin)
  title: Modami Payment Service
  version: "1.0"
paths:
  /admin/credits/adjust:
    post:
      consumes:
      - application/json
      parameters:
      - description: Admin credit adjust request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.AdminCreditAdjustRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Admin adjust user credits
      tags:
      - Admin
  /credits/balance:
